# Base stack: infra + application services.
# Override file (docker-compose.override.yml) adds local-dev conveniences.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdm}
      POSTGRES_DB: ${POSTGRES_DB:-pdm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdm}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    # One-shot job that creates the buckets on first boot
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-raw-data}
      MINIO_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS:-mlflow-artifacts}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
      mc mb --ignore-existing local/$$MINIO_BUCKET_RAW;
      mc mb --ignore-existing local/$$MINIO_BUCKET_ARTIFACTS;
      echo 'minio buckets ready';
      "
    restart: "no"

  migrate:
    build: .
    image: pdm:dev
    command: ["alembic", "upgrade", "head"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-pdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdm}
      POSTGRES_DB: ${POSTGRES_DB:-pdm}
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-raw-data}
      MINIO_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS:-mlflow-artifacts}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  ingestion-api:
    build: .
    image: pdm:dev
    command: >
      uvicorn pdm.apis.ingestion_api:app
      --host 0.0.0.0 --port 8000
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-pdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdm}
      POSTGRES_DB: ${POSTGRES_DB:-pdm}
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-raw-data}
      MINIO_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS:-mlflow-artifacts}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  simulator:
    build: .
    image: pdm:dev
    command: ["python", "-m", "pdm.simulator.run"]
    environment:
      INGESTION_API_URL: http://ingestion-api:8000
      INGEST_INTERVAL_SEC: ${INGEST_INTERVAL_SEC:-5}
      CMAPSS_TRAIN_FILE: /app/data/cmapss/train_FD001.txt
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      ingestion-api:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    image: pdm-mlflow:dev
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql+psycopg://${POSTGRES_USER:-pdm}:${POSTGRES_PASSWORD:-pdm}@postgres:5432/mlflow
      - --default-artifact-root=s3://${MINIO_BUCKET_ARTIFACTS:-mlflow-artifacts}/
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health',timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
